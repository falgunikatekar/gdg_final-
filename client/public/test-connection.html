<!DOCTYPE html>
<html>
<head>
    <title>Frontend Backend Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .result { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>Frontend-Backend Connection Test</h1>
    
    <button onclick="testBackendConnection()">Test Backend Connection</button>
    <button onclick="testLoginFromFrontend()">Test Login from Frontend</button>
    <button onclick="testCORS()">Test CORS</button>
    
    <div id="result" class="result"></div>
    
    <script>
        async function testBackendConnection() {
            try {
                const response = await fetch('/api/test/test');
                const data = await response.json();
                document.getElementById('result').innerHTML = 
                    `<div class="success">Backend Connection: ${JSON.stringify(data, null, 2)}</div>`;
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    `<div class="error">Backend Connection Error: ${error.message}</div>`;
            }
        }
        
        async function testLoginFromFrontend() {
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        userType: 'hospital',
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('result').innerHTML = 
                        `<div class="success">Login Success! Token: ${data.token.substring(0, 50)}...</div>`;
                } else {
                    document.getElementById('result').innerHTML = 
                        `<div class="error">Login Failed: ${data.message}</div>`;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    `<div class="error">Login Error: ${error.message}</div>`;
            }
        }
        
        async function testCORS() {
            try {
                const response = await fetch('/api/test/test', {
                    method: 'OPTIONS'
                });
                
                const headers = response.headers;
                document.getElementById('result').innerHTML = 
                    `<div class="success">CORS Test - Headers: ${JSON.stringify(Object.fromEntries(headers), null, 2)}</div>`;
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    `<div class="error">CORS Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
