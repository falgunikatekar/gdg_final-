<!DOCTYPE html>
<html>
<head>
    <title>Simple Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .form-group { margin: 10px 0; }
        input { padding: 8px; margin: 5px; width: 200px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Simple Login Test</h1>
    
    <div class="info">
        <strong>Instructions:</strong><br>
        1. Make sure backend server is running on port 5001<br>
        2. Click "Test Server" first<br>
        3. Then click "Test Login"
    </div>
    
    <div class="form-group">
        <label>Username:</label>
        <input type="text" id="username" value="admin">
    </div>
    
    <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password" value="admin123">
    </div>
    
    <button onclick="testServer()">1. Test Server</button>
    <button onclick="testLogin()">2. Test Login</button>
    <button onclick="clearResults()">Clear</button>
    
    <div id="result"></div>
    
    <script>
        function log(message, type = 'info') {
            const result = document.getElementById('result');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            result.appendChild(div);
        }
        
        function clearResults() {
            document.getElementById('result').innerHTML = '';
        }
        
        async function testServer() {
            log('Testing server connection...', 'info');
            
            try {
                const response = await fetch('http://localhost:5001/api/test/test');
                
                if (!response.ok) {
                    throw new Error(`Server responded with ${response.status}`);
                }
                
                const data = await response.json();
                log(`✅ Server is working! Mock mode: ${data.mockMode}`, 'success');
                return true;
            } catch (error) {
                log(`❌ Server connection failed: ${error.message}`, 'error');
                log('💡 Make sure the backend server is running: npm run dev', 'info');
                return false;
            }
        }
        
        async function testLogin() {
            log('Testing login...', 'info');
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                log('❌ Please enter username and password', 'error');
                return;
            }
            
            try {
                log('Sending login request...', 'info');
                
                const response = await fetch('http://localhost:5001/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        userType: 'hospital',
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    log(`✅ Login successful!`, 'success');
                    log(`📝 Token: ${data.token.substring(0, 50)}...`, 'info');
                    log(`👤 User: ${data.user.name} (${data.user.type})`, 'info');
                    
                    // Test the token
                    await testToken(data.token);
                } else {
                    log(`❌ Login failed: ${data.message}`, 'error');
                    if (data.errors) {
                        log(`📝 Errors: ${JSON.stringify(data.errors)}`, 'error');
                    }
                }
            } catch (error) {
                log(`❌ Login error: ${error.message}`, 'error');
                log('💡 Check if backend server is running and CORS is configured', 'info');
            }
        }
        
        async function testToken(token) {
            log('Testing token...', 'info');
            
            try {
                const response = await fetch('http://localhost:5001/api/hospital/dashboard', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    }
                });
                
                if (response.ok) {
                    log('✅ Token works! Dashboard accessible', 'success');
                } else {
                    const data = await response.json();
                    log(`❌ Token failed: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ Token test error: ${error.message}`, 'error');
            }
        }
        
        // Auto-test server on page load
        window.onload = () => {
            log('Page loaded. Ready to test!', 'info');
        };
    </script>
</body>
</html>
